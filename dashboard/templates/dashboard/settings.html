{% extends "dashboard/base.html" %}

{% block content %}
<div class="max-w-3xl space-y-6">
    <div>
        <h2 class="text-3xl font-bold text-white tracking-tight">Settings</h2>
        <p class="text-slate-400 mt-1">Configure AI providers, SMTP details, and user profile data.</p>
    </div>

    <div class="glass-panel p-6 rounded-xl border border-dark-600">
        <form method="post" action="{% url 'dashboard:settings' %}">
            {% csrf_token %}
            
            <div class="space-y-6">
                <!-- AI Config -->
                <div>
                    <h3 class="text-lg font-medium text-white mb-4 flex items-center gap-2"><i class="ph-fill ph-brain text-brand"></i> AI Configuration</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Provider</label>
                            <select name="ai_provider" class="w-full bg-dark-900 border border-dark-600 text-white rounded-md px-4 py-2 focus:ring-2 focus:ring-brand outline-none">
                                <option value="gemini">Google Gemini</option>
                                <option value="grok">xAI Grok</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">API Key</label>
                            <input type="password" name="api_key" placeholder="••••••••••••••••" class="w-full bg-dark-900 border border-dark-600 text-white rounded-md px-4 py-2 focus:ring-2 focus:ring-brand outline-none">
                        </div>
                    </div>
                </div>

                <hr class="border-dark-700">

                <!-- Email Config -->
                <div>
                    <h3 class="text-lg font-medium text-white mb-4 flex items-center gap-2"><i class="ph-fill ph-envelope text-brand"></i> SMTP Settings</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">SMTP User (Email)</label>
                            <input type="email" name="smtp_user" class="w-full bg-dark-900 border border-dark-600 text-white rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">App Password</label>
                            <input type="password" name="smtp_password" class="w-full bg-dark-900 border border-dark-600 text-white rounded-md px-4 py-2">
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="bg-brand hover:bg-brand-hover text-white px-6 py-2.5 rounded-lg font-medium transition-colors border border-brand-hover shadow-lg shadow-brand/20">
                        Save Configurations
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
